<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#17131f">
  <title>研究ライブラリ｜イラストプロンプト資料</title>
  <style>
    :root{
      color-scheme:dark;
      font-family:system-ui,-apple-system,"Yu Gothic UI",sans-serif;
      --bg:#17131f;--panel:#241d2e;--panel2:#2d233a;--line:#40364f;
      --text:#f5efff;--muted:#cfc5dc;--accent:#bd82ff;--accent2:#7ed7c4;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;min-height:100vh;background:var(--bg);color:var(--text)}
    button,input{font:inherit}
    button{color:inherit}
    a{color:var(--accent)}
    .shell{width:min(1180px,100%);margin:0 auto;padding:20px max(16px,env(safe-area-inset-right)) 40px max(16px,env(safe-area-inset-left))}
    .topbar{display:flex;align-items:center;gap:12px;margin-bottom:22px}
    .home{display:inline-flex;align-items:center;min-height:44px;padding:0 14px;border:1px solid var(--line);border-radius:12px;color:var(--muted);text-decoration:none;background:var(--panel)}
    .home:hover,.home:focus-visible{border-color:var(--accent);color:var(--text);outline:none}
    h1{margin:0;font-size:clamp(1.45rem,6vw,2.35rem)}
    .lead{margin:8px 0 20px;color:var(--muted);line-height:1.7}
    .controls{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;margin-bottom:16px}
    .search{width:100%;min-height:48px;border:1px solid var(--line);border-radius:14px;padding:0 16px;background:var(--panel);color:var(--text);outline:none}
    .search:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(189,130,255,.15)}
    .tabs{display:flex;gap:6px;padding:4px;border:1px solid var(--line);border-radius:14px;background:var(--panel)}
    .tab{min-height:40px;padding:0 14px;border:0;border-radius:10px;background:transparent;color:var(--muted);cursor:pointer}
    .tab[aria-selected="true"]{background:var(--accent);color:#1a1022;font-weight:700}
    .layout{display:grid;grid-template-columns:340px minmax(0,1fr);gap:16px;align-items:start}
    .list,.detail{border:1px solid var(--line);border-radius:18px;background:var(--panel);overflow:hidden}
    .list{position:sticky;top:16px;max-height:calc(100vh - 32px);overflow-y:auto}
    .summary{padding:13px 16px;border-bottom:1px solid var(--line);color:var(--muted);font-size:.9rem}
    .group{padding:11px 16px 8px;border-bottom:1px solid var(--line);background:#1c1724;color:var(--accent2);font-size:12px;font-weight:700;letter-spacing:.04em}
    .item{display:block;width:100%;padding:16px;border:0;border-bottom:1px solid var(--line);background:transparent;text-align:left;cursor:pointer}
    .item:last-child{border-bottom:0}
    .item:hover,.item:focus-visible{background:var(--panel2);outline:none}
    .item.active{background:rgba(189,130,255,.12);box-shadow:inset 4px 0 var(--accent)}
    .item-title{display:block;margin-bottom:7px;font-weight:700;line-height:1.45}
    .item-id{display:block;color:var(--muted);font:12px ui-monospace,SFMono-Regular,Consolas,monospace;overflow-wrap:anywhere}
    .badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
    .badge{padding:3px 8px;border:1px solid var(--line);border-radius:999px;color:var(--muted);font-size:12px}
    .badge.status{border-color:rgba(126,215,196,.45);color:var(--accent2)}
    .detail{min-height:520px;padding:clamp(20px,4vw,38px)}
    .mobile-back{display:none;min-height:42px;margin:-6px 0 16px;padding:0 12px;border:1px solid var(--line);border-radius:10px;background:var(--panel2);cursor:pointer}
    .doc-id{color:var(--accent2);font:12px ui-monospace,SFMono-Regular,Consolas,monospace;overflow-wrap:anywhere}
    .doc-title{margin:8px 0 12px;font-size:clamp(1.5rem,6vw,2.3rem);line-height:1.3}
    .doc-meta{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:28px}
    .preview-wrap{margin:0 0 28px;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#100d15}
    .preview-wrap a{display:block;color:inherit}
    .preview{display:block;width:100%;height:auto;aspect-ratio:3/2;object-fit:cover;background:#100d15}
    .preview-caption{padding:10px 14px;color:var(--muted);font-size:12px;line-height:1.5}
    .content{color:#eee7f7;line-height:1.85;overflow-wrap:anywhere}
    .content h1{font-size:1.5rem;margin:36px 0 12px}
    .content h2{font-size:1.2rem;margin:32px 0 10px;padding-bottom:8px;border-bottom:1px solid var(--line)}
    .content h3{font-size:1.05rem;margin:26px 0 8px}
    .content p{margin:0 0 16px}
    .content ul{padding-left:1.25rem;margin:0 0 18px}
    .content li{margin:7px 0}
    .content blockquote{margin:18px 0;padding:2px 0 2px 16px;border-left:3px solid var(--accent);color:var(--muted)}
    .codebox{position:relative;margin:16px 0 22px}
    pre{margin:0;padding:18px;padding-top:48px;border:1px solid var(--line);border-radius:14px;background:#100d15;color:#f4eef9;white-space:pre-wrap;overflow-wrap:anywhere;font:13px/1.75 ui-monospace,SFMono-Regular,Consolas,monospace}
    .copy{position:absolute;top:9px;right:9px;min-height:30px;padding:0 10px;border:1px solid var(--line);border-radius:8px;background:var(--panel2);cursor:pointer}
    .copy:hover,.copy:focus-visible{border-color:var(--accent);outline:none}
    .composer{margin:0 0 28px;padding:18px;border:1px solid rgba(126,215,196,.45);border-radius:16px;background:#1b1624}
    .composer h3{margin:0 0 8px;font-size:1.05rem;color:var(--accent2)}
    .composer-note{margin:0 0 14px;color:var(--muted);font-size:.9rem;line-height:1.6}
    .preset-row,.check-grid{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 16px}
    .preset{min-height:36px;padding:0 11px;border:1px solid var(--line);border-radius:999px;background:var(--panel2);cursor:pointer}
    .preset:hover,.preset:focus-visible{border-color:var(--accent);outline:none}
    .composer-status{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:10px 0 14px;color:var(--muted);font-size:.88rem}
    .composer-count{padding:4px 9px;border:1px solid rgba(126,215,196,.55);border-radius:999px;background:rgba(126,215,196,.12);color:var(--accent2);font-weight:700}
    .composer-flash{opacity:0;transition:opacity .18s ease;color:var(--accent2)}
    .composer-flash.is-visible{opacity:1}
    .active-chips{display:flex;flex-wrap:wrap;gap:6px;margin:-4px 0 14px}
    .chip{padding:4px 8px;border:1px solid rgba(126,215,196,.5);border-radius:999px;background:rgba(126,215,196,.1);color:var(--accent2);font-size:12px}
    .check{display:flex;gap:8px;align-items:flex-start;min-height:40px;padding:9px 10px;border:1px solid var(--line);border-radius:12px;background:#211a2b;color:var(--text);cursor:pointer}
    .check.is-on{border-color:rgba(126,215,196,.65);background:rgba(126,215,196,.12);box-shadow:inset 3px 0 var(--accent2)}
    .check.is-off{opacity:.68}
    .check input{margin-top:3px;accent-color:var(--accent)}
    .check small{display:block;margin-top:2px;color:var(--muted);font-size:11px;line-height:1.4}
    .asset-options{display:grid;gap:10px;margin:12px 0 16px}
    .asset-field{display:none;margin:8px 0 0 25px}
    .asset-field.is-open{display:block}
    .asset-field textarea{width:100%;min-height:70px;resize:vertical;border:1px solid var(--line);border-radius:12px;padding:10px;background:#100d15;color:var(--text);line-height:1.6}
    .assembled{position:relative;margin-top:14px}
    .assembled-output{display:grid;gap:10px;margin:0;padding:52px 14px 14px;border:1px solid var(--line);border-radius:14px;background:#100d15;color:#f4eef9;white-space:pre-wrap;overflow-wrap:anywhere;font:13px/1.75 ui-monospace,SFMono-Regular,Consolas,monospace}
    .prompt-block{padding:12px;border:1px solid var(--line);border-radius:12px;background:#17111f}
    .prompt-block.base{border-color:rgba(189,130,255,.45)}
    .prompt-block.asset{border-color:rgba(255,206,117,.45);background:rgba(255,206,117,.06)}
    .prompt-block.correction{border-color:rgba(126,215,196,.7);background:rgba(126,215,196,.09)}
    .prompt-block.negative{border-color:rgba(255,137,154,.58);background:rgba(255,137,154,.07)}
    .block-title{display:block;margin-bottom:6px;font-family:system-ui,-apple-system,"Yu Gothic UI",sans-serif;font-size:12px;font-weight:800;letter-spacing:.04em;color:var(--accent)}
    .prompt-block.correction .block-title{color:var(--accent2)}
    .prompt-block.negative .block-title{color:#ffb1bd}
    .prompt-block.asset .block-title{color:#ffd98f}
    .assembled-actions{position:absolute;top:9px;right:9px;display:flex;gap:8px}
    .assembled-actions button{min-height:30px;padding:0 10px;border:1px solid var(--line);border-radius:8px;background:var(--panel2);cursor:pointer}
    .assembled-actions button:hover,.assembled-actions button:focus-visible{border-color:var(--accent);outline:none}
    .table-wrap{overflow-x:auto;margin:16px 0 22px}
    table{width:100%;border-collapse:collapse;font-size:.9rem}
    th,td{padding:10px;border:1px solid var(--line);text-align:left;vertical-align:top}
    th{background:var(--panel2)}
    .empty{padding:56px 24px;text-align:center;color:var(--muted);line-height:1.8}
    .error{color:#ffb1bd}
    @media(max-width:760px){
      .shell{padding-top:14px}.topbar{align-items:flex-start;flex-direction:column}.controls{grid-template-columns:1fr}.tabs{overflow-x:auto}.tab{flex:1;white-space:nowrap}.layout{display:block}.list{position:static;max-height:none}.detail{display:none;margin-top:0;border-radius:16px}.layout.show-detail .list{display:none}.layout.show-detail .detail{display:block}.mobile-back{display:inline-flex;align-items:center}.detail{padding:18px}.content{font-size:.96rem}pre{font-size:12px}}
  </style>
</head>
<body>
  <main class="shell">
    <div class="topbar">
      <a class="home" href="./index.html">← トップ</a>
      <div>
        <h1>研究ライブラリ</h1>
        <p class="lead">調査資料を、知識カード・再利用部品・完成プロンプトへ整理したライブラリです。</p>
      </div>
    </div>

    <div class="controls">
      <input class="search" id="search" type="search" placeholder="目的・場面・キーワードで検索" aria-label="ライブラリを検索">
      <div class="tabs" role="tablist" aria-label="資料の種類">
        <button class="tab" role="tab" data-type="prompts" aria-selected="true">完成プロンプト</button>
        <button class="tab" role="tab" data-type="modules" aria-selected="false">部品</button>
        <button class="tab" role="tab" data-type="cards" aria-selected="false">知識カード</button>
      </div>
    </div>

    <div class="layout" id="layout">
      <section class="list" aria-label="資料一覧">
        <div class="summary" id="summary">読み込み中…</div>
        <div id="items"></div>
      </section>
      <article class="detail" id="detail" aria-live="polite">
        <button class="mobile-back" id="mobileBack" type="button">← 一覧へ戻る</button>
        <div class="empty">左の一覧から資料を選んでください。</div>
      </article>
    </div>
  </main>

  <script>
    const state={type:'prompts',query:'',entries:[],selected:null,defaults:null};
    const g=id=>document.getElementById(id);
    const escapeHtml=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const inline=s=>escapeHtml(s).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code>$1</code>');

    function parseFrontMatter(text){
      const m=text.match(/^---\s*\n([\s\S]*?)\n---\s*\n?/);
      const meta={};
      if(m){
        m[1].split('\n').forEach(line=>{
          const p=line.indexOf(':');if(p<0)return;
          const key=line.slice(0,p).trim(),raw=line.slice(p+1).trim();
          if(raw.startsWith('[')&&raw.endsWith(']')) meta[key]=raw.slice(1,-1).split(',').map(v=>v.trim().replace(/^['"]|['"]$/g,'')).filter(Boolean);
          else meta[key]=raw.replace(/^['"]|['"]$/g,'');
        });
      }
      return {meta,body:m?text.slice(m[0].length):text};
    }

    function renderMarkdown(source){
      const lines=source.replace(/\r/g,'').split('\n');let out='',paragraph=[],list=[],i=0;
      const flushP=()=>{if(paragraph.length){out+=`<p>${inline(paragraph.join(' '))}</p>`;paragraph=[]}};
      const flushList=()=>{if(list.length){out+='<ul>'+list.map(x=>`<li>${inline(x)}</li>`).join('')+'</ul>';list=[]}};
      while(i<lines.length){const line=lines[i];
        if(line.startsWith('```')){flushP();flushList();const lang=line.slice(3).trim();let code=[];i++;while(i<lines.length&&!lines[i].startsWith('```'))code.push(lines[i++]);const value=code.join('\n');out+=`<div class="codebox"><button class="copy" type="button" data-copy="${escapeHtml(value)}">コピー</button><pre><code class="${escapeHtml(lang)}">${escapeHtml(value)}</code></pre></div>`;i++;continue}
        if(/^\|.+\|$/.test(line)&&i+1<lines.length&&/^\|?\s*:?-+/.test(lines[i+1])){flushP();flushList();const rows=[];rows.push(line);i+=2;while(i<lines.length&&/^\|.+\|$/.test(lines[i]))rows.push(lines[i++]);const cells=rows.map(r=>r.replace(/^\||\|$/g,'').split('|').map(c=>c.trim()));out+='<div class="table-wrap"><table><thead><tr>'+cells[0].map(c=>`<th>${inline(c)}</th>`).join('')+'</tr></thead><tbody>'+cells.slice(1).map(row=>'<tr>'+row.map(c=>`<td>${inline(c)}</td>`).join('')+'</tr>').join('')+'</tbody></table></div>';continue}
        const h=line.match(/^(#{1,3})\s+(.+)/);if(h){flushP();flushList();const n=h[1].length;out+=`<h${n}>${inline(h[2])}</h${n}>`;i++;continue}
        const li=line.match(/^[-*]\s+(.+)/);if(li){flushP();list.push(li[1]);i++;continue}else flushList();
        const q=line.match(/^>\s?(.*)/);if(q){flushP();out+=`<blockquote>${inline(q[1])}</blockquote>`;i++;continue}
        if(!line.trim()){flushP()}else paragraph.push(line.trim());i++;
      }
      flushP();flushList();return out;
    }

    function tags(meta){return [meta.tier,meta.family,meta.goal_primary,...(meta.goal_secondary||[]),...(meta.goal||[]),...(meta.control||[]),...(meta.scene||[]),...(meta.phase||[])].filter((v,i,a)=>v&&a.indexOf(v)===i).slice(0,7)}
    function firstCodeAfter(body,heading){
      const idx=body.indexOf(heading);const part=idx>=0?body.slice(idx):body;
      const m=part.match(/```(?:text)?\s*\n([\s\S]*?)\n```/);return m?m[1].trim():'';
    }
    function promptParts(entry){
      return {
        positive:firstCodeAfter(entry.body,'## 完成プロンプト')||firstCodeAfter(entry.body,'```'),
        negative:firstCodeAfter(entry.body,'## ネガティブ')||''
      };
    }
    function buildComposer(entry){
      if(state.type!=='prompts'||!state.defaults?.defaults?.length)return '';
      const presets=state.defaults.presets||[];
      const defs=[...state.defaults.defaults].sort((a,b)=>(a.priority||0)-(b.priority||0));
      return `<section class="composer" data-composer="${escapeHtml(entry.meta.id)}">
        <h3>最終プロンプト組み立て</h3>
        <p class="composer-note">チェックをオンにした補正・アセットだけが下の統合プロンプトに入ります。オフにすると本文から消えます。</p>
        <div class="preset-row" aria-label="補正プリセット">${presets.map(p=>`<button class="preset" type="button" data-preset="${escapeHtml(p.id)}">${escapeHtml(p.label)}</button>`).join('')}</div>
        <div class="composer-status"><span class="composer-count" data-selected-count>選択中の補正：0件</span><span class="composer-flash" data-composer-flash>統合プロンプトを更新しました</span></div>
        <div class="active-chips" data-active-chips></div>
        <div class="check-grid" aria-label="デフォルト補正">${defs.map(d=>`<label class="check"><input type="checkbox" data-default-id="${escapeHtml(d.id)}" ${d.initial_checked?'checked':''}><span>${escapeHtml(d.label)}<small>${escapeHtml(d.default_state||'')}</small></span></label>`).join('')}</div>
        <div class="asset-options">
          <label class="check"><input type="checkbox" data-asset-toggle="reference"><span>参考画像を使う<small>画像名や使い方メモを統合プロンプトに追加</small></span></label>
          <div class="asset-field" data-asset-field="reference"><textarea data-asset-text="reference" placeholder="例: character_front_001 をキャラ同一性の参照にする。pose_sprint_low_angle_001 を低角度の走りポーズ参照にする。"></textarea></div>
          <label class="check"><input type="checkbox" data-asset-toggle="character"><span>キャラクターアセットを追加する<small>専用キャラの外見・雰囲気・固有衣装を追加</small></span></label>
          <div class="asset-field" data-asset-field="character"><textarea data-asset-text="character" placeholder="例: 黒髪の少女剣士。長い黒髪、黒いロングコート、細身の刀、冷静だが緊張感のある表情。"></textarea></div>
          <label class="check"><input type="checkbox" data-asset-toggle="world"><span>背景・世界観アセットを追加する<small>舞台、光、色、世界観メモを追加</small></span></label>
          <div class="asset-field" data-asset-field="world"><textarea data-asset-text="world" placeholder="例: 雨の裏路地、青白い逆光、濡れた路面の反射、紙片が風で流れる。"></textarea></div>
        </div>
        <div class="assembled">
          <div class="assembled-actions"><button type="button" data-refresh-assembled>更新</button><button type="button" data-copy-target="assembledPrompt">コピー</button></div>
          <div id="assembledPrompt" class="assembled-output" role="region" aria-label="生成される統合プロンプト"></div>
        </div>
      </section>`;
    }
    function syncCheckStyles(root){
      root.querySelectorAll('.check').forEach(label=>{
        const input=label.querySelector('input[type="checkbox"]');
        if(!input)return;
        label.classList.toggle('is-on',input.checked);
        label.classList.toggle('is-off',!input.checked);
      });
    }
    function renderPromptBlocks(sections){
      return sections.map(s=>`<section class="prompt-block ${escapeHtml(s.kind)}"><span class="block-title">${escapeHtml(s.title)}</span>${escapeHtml(s.text)}</section>`).join('');
    }
    function updateAssetFields(root){
      root.querySelectorAll('[data-asset-toggle]').forEach(input=>{
        const field=root.querySelector(`[data-asset-field="${CSS.escape(input.dataset.assetToggle)}"]`);
        if(field)field.classList.toggle('is-open',input.checked);
      });
    }
    function assemblePrompt(){
      const root=document.querySelector('.composer');if(!root)return;
      const entry=state.entries.find(x=>x.meta.id===state.selected);if(!entry)return;
      updateAssetFields(root);
      const parts=promptParts(entry),defs=state.defaults?.defaults||[];
      const enabled=[...root.querySelectorAll('[data-default-id]:checked')].map(x=>x.dataset.defaultId);
      const pos=[],neg=[];
      const enabledDefs=defs.filter(d=>enabled.includes(d.id)).sort((a,b)=>(a.priority||0)-(b.priority||0));
      enabledDefs.forEach(d=>{pos.push(...(d.positive||[]));neg.push(...(d.negative||[]));});
      const assetText=key=>root.querySelector(`[data-asset-text="${key}"]`)?.value.trim();
      const sections=[{kind:'base',title:'Base prompt',text:parts.positive}];
      if(root.querySelector('[data-asset-toggle="character"]')?.checked&&assetText('character'))sections.push({kind:'asset',title:'Character asset',text:assetText('character')});
      if(root.querySelector('[data-asset-toggle="world"]')?.checked&&assetText('world'))sections.push({kind:'asset',title:'World / background asset',text:assetText('world')});
      if(root.querySelector('[data-asset-toggle="reference"]')?.checked&&assetText('reference'))sections.push({kind:'asset',title:'Reference images',text:assetText('reference')});
      if(pos.length)sections.push({kind:'correction',title:'Default corrections',text:[...new Set(pos)].join(', ')});
      const negative=[parts.negative,...neg].filter(Boolean);
      if(negative.length)sections.push({kind:'negative',title:'Negative prompt',text:[...new Set(negative.flatMap(x=>String(x).split(',').map(v=>v.trim()).filter(Boolean)))].join(', ')});
      const plain=sections.map(s=>`${s.title}:\n${s.text}`).join('\n\n');
      const out=root.querySelector('#assembledPrompt');if(out){out.innerHTML=renderPromptBlocks(sections);out.dataset.plain=plain}
      const count=root.querySelector('[data-selected-count]');if(count)count.textContent=`選択中の補正：${enabledDefs.length}件`;
      const chips=root.querySelector('[data-active-chips]');if(chips)chips.innerHTML=enabledDefs.map(d=>`<span class="chip">${escapeHtml(d.label)}</span>`).join('');
      syncCheckStyles(root);
      const flash=root.querySelector('[data-composer-flash]');if(flash){flash.classList.add('is-visible');clearTimeout(root._flashTimer);root._flashTimer=setTimeout(()=>flash.classList.remove('is-visible'),900)}
    }
    function filtered(){const q=state.query.trim().toLowerCase();return state.entries.filter(e=>e.type===state.type&&(!q||`${e.meta.title} ${e.meta.id} ${e.text}`.toLowerCase().includes(q)))}
    function renderList(){const found=filtered();g('summary').textContent=`${found.length}件`;if(!found.length){g('items').innerHTML='<div class="empty">該当する資料がありません。</div>';return}const familyOrder=['高速戦・瞬間移動','重量級の一撃','武術・格闘技','剣戟','銃撃・射撃戦','魔法・必殺技','巨大怪獣・巨大ロボ','スポーツ','ダンス・舞踏','レース・乗り物'];const tierOrder=['基本型','演出型','差し替え型'];const sorted=[...found].sort((a,b)=>{if(state.type!=='prompts')return String(a.meta.title).localeCompare(String(b.meta.title),'ja');const af=familyOrder.indexOf(a.meta.family),bf=familyOrder.indexOf(b.meta.family);if(af!==bf)return (af<0?999:af)-(bf<0?999:bf);return tierOrder.indexOf(a.meta.tier)-tierOrder.indexOf(b.meta.tier)});let last='';g('items').innerHTML=sorted.map(e=>{const family=state.type==='prompts'?(e.meta.family||'その他'):'';const heading=family&&family!==last?`<div class="group">${escapeHtml(family)}</div>`:'';last=family;return heading+`<button class="item ${state.selected===e.meta.id?'active':''}" data-id="${escapeHtml(e.meta.id)}"><span class="item-title">${escapeHtml(e.meta.title||e.meta.id)}</span><span class="item-id">${escapeHtml(e.meta.id)}</span><span class="badges">${tags(e.meta).map(t=>`<span class="badge">${escapeHtml(t)}</span>`).join('')}</span></button>`}).join('');}
    function select(id,push=true){const e=state.entries.find(x=>x.meta.id===id);if(!e)return;state.selected=id;renderList();const preview=e.meta.preview_image?`<figure class="preview-wrap"><a href="./${escapeHtml(e.meta.preview_image)}" target="_blank" rel="noopener"><img class="preview" src="./${escapeHtml(e.meta.preview_image)}" alt="${escapeHtml(e.meta.title||e.meta.id)}のテスト生成作例" loading="lazy"></a><figcaption class="preview-caption">Codexによるテスト生成作例。クリックすると原寸画像を開きます。</figcaption></figure>`:'';g('detail').innerHTML=`<button class="mobile-back" id="mobileBack" type="button">← 一覧へ戻る</button><div class="doc-id">${escapeHtml(e.meta.id)}</div><h2 class="doc-title">${escapeHtml(e.meta.title||e.meta.id)}</h2><div class="doc-meta"><span class="badge status">${escapeHtml(e.meta.status||'')}</span>${e.meta.preview_image?'<span class="badge status">作例あり</span>':''}${tags(e.meta).map(t=>`<span class="badge">${escapeHtml(t)}</span>`).join('')}</div>${preview}${buildComposer(e)}<div class="content">${renderMarkdown(e.body)}</div>`;g('layout').classList.add('show-detail');assemblePrompt();if(push)history.replaceState(null,'','#'+encodeURIComponent(id));window.scrollTo({top:0,behavior:'smooth'});}
    async function copyText(text,button){await navigator.clipboard.writeText(text);const old=button.textContent;button.textContent='コピー済み';setTimeout(()=>button.textContent=old,1200)}
    async function init(){try{const [index,defaults]=await Promise.all([fetch('./catalog/'+encodeURIComponent('ライブラリ索引.json')).then(r=>{if(!r.ok)throw new Error(r.status);return r.json()}),fetch('./defaults/default-corrections.json').then(r=>r.ok?r.json():null).catch(()=>null)]);state.defaults=defaults;const jobs=[];['prompts','modules','cards'].forEach(type=>(index[type]||[]).forEach(entry=>jobs.push(fetch('./'+entry.path.split('/').map(encodeURIComponent).join('/')).then(r=>r.text()).then(text=>{const parsed=parseFrontMatter(text);return{type,text,body:parsed.body,meta:{...parsed.meta,id:parsed.meta.id||entry.id}}}))));state.entries=await Promise.all(jobs);renderList();const hash=decodeURIComponent(location.hash.slice(1));const hashed=state.entries.find(e=>e.meta.id===hash);if(hashed)select(hashed.meta.id,false);else if(innerWidth>760){const first=filtered()[0];if(first)select(first.meta.id,false)}}catch(err){g('summary').textContent='読み込み失敗';g('items').innerHTML='<div class="empty error">ライブラリを読み込めませんでした。Pages上から開き直してください。</div>';console.error(err)}}
    document.addEventListener('input',e=>{if(e.target.closest('.composer'))assemblePrompt()});
    document.addEventListener('change',e=>{if(e.target.closest('.composer'))assemblePrompt()});
    document.addEventListener('click',e=>{const item=e.target.closest('[data-id]');if(item)select(item.dataset.id);const tab=e.target.closest('.tab');if(tab){state.type=tab.dataset.type;document.querySelectorAll('.tab').forEach(x=>x.setAttribute('aria-selected',String(x===tab)));state.selected=null;g('layout').classList.remove('show-detail');renderList();const first=filtered()[0];if(first&&innerWidth>760)select(first.meta.id)}const preset=e.target.closest('[data-preset]');if(preset){const p=(state.defaults?.presets||[]).find(x=>x.id===preset.dataset.preset);if(p){document.querySelectorAll('[data-default-id]').forEach(input=>input.checked=p.enabled_defaults.includes(input.dataset.defaultId));assemblePrompt()}}const refresh=e.target.closest('[data-refresh-assembled]');if(refresh)assemblePrompt();const target=e.target.closest('[data-copy-target]');if(target){const el=document.getElementById(target.dataset.copyTarget);if(el)copyText(el.dataset.plain||el.textContent,target)}const copy=e.target.closest('[data-copy]');if(copy)copyText(copy.dataset.copy,copy);if(e.target.id==='mobileBack')g('layout').classList.remove('show-detail')});
    g('search').addEventListener('input',e=>{state.query=e.target.value;renderList()});
    init();
  </script>
</body>
</html>
